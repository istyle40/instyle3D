<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InStyle3D Printing Studios</title>
    <meta
      name="description"
      content="Custom 3D printing, artistic sculptures and personalised creations designed with precision and brought to life layer by layer."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=reference-image-2" />
  </head>
  <body class="intro-running">
    <div class="intro-overlay" aria-label="Cinematic intro">
      <div class="intro-glow" aria-hidden="true"></div>
      <div class="intro-wire" aria-hidden="true"></div>
      <div class="intro-sculpture" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="intro-nozzle" aria-hidden="true"></div>
      <img class="intro-logo" src="assets/instyle3d-logo-orange.png" alt="InStyle3D" />
      <div class="intro-title" aria-hidden="true">
        <span>Ideas</span>
        <span>Become</span>
        <span>Reality</span>
      </div>
      <button class="skip-intro" type="button">Skip Intro</button>
    </div>

    <header class="top-nav" aria-label="Primary navigation">
      <nav class="nav-links" aria-label="Main menu">
        <a class="is-active" href="#top">Home</a>
        <a href="#creations">Creations</a>
        <a href="#about">About</a>
        <a href="#custom-projects">Custom Projects</a>
        <a href="#contact">Contact</a>
        <a class="quote-link" href="#quote">Get a Quote</a>
      </nav>
      <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main id="top">
      <section class="hero" aria-label="InStyle3D cinematic hero">
        <div class="ambient-glow" aria-hidden="true"></div>
        <div class="particle-field" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="wireframe-wrap" aria-hidden="true">
          <svg class="wireframe" viewBox="0 0 760 760" role="img">
            <g class="mesh mesh-soft">
              <path d="M20 500 C160 360 260 650 410 480 S620 210 750 280" />
              <path d="M40 560 C180 420 280 700 440 540 S650 250 760 360" />
              <path d="M0 430 C130 320 260 560 400 410 S610 160 730 210" />
              <path d="M120 300 C240 210 340 470 490 330 S650 130 740 170" />
              <path d="M160 650 C260 560 360 700 520 600 S690 410 750 450" />
            </g>
            <g class="mesh mesh-lines">
              <path d="M70 500 L190 410 L330 495 L460 395 L610 300 L735 340" />
              <path d="M130 585 L260 500 L390 560 L540 455 L710 510" />
              <path d="M110 390 L245 350 L380 410 L520 260 L690 215" />
              <path d="M245 350 L260 500 L330 495 L390 560 L460 395 L540 455" />
              <path d="M520 260 L610 300 L690 215 L735 340 L710 510" />
            </g>
            <g class="mesh-dots">
              <circle cx="70" cy="500" r="3" /><circle cx="190" cy="410" r="3" />
              <circle cx="330" cy="495" r="3" /><circle cx="460" cy="395" r="3" />
              <circle cx="610" cy="300" r="3" /><circle cx="735" cy="340" r="3" />
              <circle cx="260" cy="500" r="3" /><circle cx="390" cy="560" r="3" />
              <circle cx="540" cy="455" r="3" /><circle cx="690" cy="215" r="3" />
              <circle cx="710" cy="510" r="3" /><circle cx="520" cy="260" r="3" />
            </g>
          </svg>
        </div>

        <div class="left-visual" aria-hidden="true">
          <div class="printer-arm">
            <span class="rail rail-top"></span>
            <span class="rail rail-bottom"></span>
            <span class="rail rail-glow"></span>
            <span class="printer-block"></span>
          </div>
          <div class="nozzle">
            <span class="nozzle-ring"></span>
            <span class="nozzle-ring nozzle-ring-low"></span>
            <span></span>
          </div>
          <div class="filament"></div>
          <div class="sculpture">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="print-bed"></div>
        </div>

        <div class="hero-content">
          <img class="hero-logo" src="assets/instyle3d-logo-orange.png" alt="InStyle3D Design 3D Printing" />
          <span class="logo-rule" aria-hidden="true"></span>
          <div class="headline" aria-label="Ideas become reality">
            <span>Ideas</span>
            <span class="orange">Become</span>
            <span>Reality</span>
          </div>
          <p>
            Custom 3D printing, artistic sculptures and personalised creations designed
            with precision and brought to life layer by layer.
          </p>
          <div class="hero-actions" aria-label="Primary actions">
            <a class="btn btn-filled" href="#creations">Explore Our Creations</a>
            <a class="btn btn-outline" href="#custom-projects">Start a Custom Project</a>
          </div>
          <div class="scroll-cue" aria-hidden="true">
            <span class="mouse-icon"></span>
            <span class="arrow-down"></span>
            <strong>Scroll to Discover</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
